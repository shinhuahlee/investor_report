<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投組績效報告</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:      #0f1923;
    --ink-60:   #5a6472;
    --ink-20:   #dce1e7;
    --paper:    #f8f7f4;
    --white:    #ffffff;
    --accent:   #1a3c5e;
    --accent2:  #c8922a;
    --green:    #2a7c5e;
    --red:      #c0392b;
    --radius:   4px;
    --shadow:   0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 48px 64px 40px;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    right: -80px; bottom: -80px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(200,146,42,.15);
    pointer-events: none;
  }
  header .eyebrow {
    font-size: 11px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
    margin-bottom: 10px;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(26px, 4vw, 42px);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 6px;
  }
  header .sub {
    font-size: 13px;
    color: rgba(255,255,255,.6);
  }
  header .date-badge {
    position: absolute;
    top: 48px; right: 64px;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    text-align: right;
    line-height: 1.8;
  }

  /* ── Layout ── */
  main { max-width: 1200px; margin: 0 auto; padding: 48px 32px 80px; }

  section { margin-bottom: 56px; }
  section h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--ink-20);
  }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 8px;
  }
  .kpi {
    background: var(--white);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    box-shadow: var(--shadow);
  }
  .kpi .label {
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-60);
    margin-bottom: 8px;
  }
  .kpi .value {
    font-size: clamp(16px, 1.8vw, 24px);
    font-weight: 600;
    letter-spacing: -.5px;
    line-height: 1.2;
    white-space: nowrap;
  }
  .kpi .value.pos { color: var(--green); }
  .kpi .value.neg { color: var(--red); }
  .kpi .value.neu { color: var(--ink); }
  .kpi .sub-value {
    font-size: 11px;
    color: var(--ink-60);
    margin-top: 6px;
  }

  /* ── Chart Cards ── */
  .chart-card {
    background: var(--white);
    border: 1px solid var(--ink-20);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 24px 16px;
    margin-bottom: 20px;
  }
  .chart-card h3 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink-60);
    margin-bottom: 16px;
  }

  /* ── Yearly Table ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: var(--accent);
    color: #fff;
  }
  th, td {
    padding: 10px 16px;
    text-align: right;
    white-space: nowrap;
  }
  th:first-child, td:first-child { text-align: left; }
  tbody tr:nth-child(even) { background: #f2f4f6; }
  .pos { color: var(--green); font-weight: 500; }
  .neg { color: var(--red);   font-weight: 500; }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-size: 11px;
    color: var(--ink-60);
    padding: 24px;
    border-top: 1px solid var(--ink-20);
    margin-top: 32px;
  }
  footer strong { color: var(--accent); }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    header {
      padding: 28px 20px 28px;
    }
    header .date-badge {
      position: static;
      text-align: left;
      margin-top: 10px;l
      font-size: 11px;
      color: rgba(255,255,255,.50);
    }
    main { padding: 20px 12px 60px; }
    section { margin-bottom: 36px; }
    section h2 { font-size: 18px; margin-bottom: 14px; }
    .kpi-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .kpi { padding: 14px 12px 12px; }
    .kpi .label { font-size: 10px; }
    .kpi .value {
      font-size: clamp(15px, 5vw, 22px);
      white-space: normal;
      word-break: break-word;
    }
    .kpi .sub-value { font-size: 10px; }
    .chart-card { padding: 14px 10px 10px; }
    .chart-card h3 { font-size: 11px; }
    #chart-equity { height: 240px !important; }
    #chart-dd     { height: 140px !important; }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">量化策略</p>
  <h1>投組績效報告</h1>
  <p class="sub">多策略量化交易投資組合</p>
  <div class="date-badge">

  </div>

      <div class="kpi">

  </section>

  <!-- Portfolio Equity -->
  <section>

    <div class="chart-card">

  </section>


</main>

<footer>
  <p><strong>投組績效報告</strong> &nbsp;|&nbsp; 本報告僅供專業投資人參閱 &nbsp;|&nbsp; 2026-05-14</p>
  <p style="margin-top:6px">過去績效不代表未來獲利之保證。</p>
</footer>
